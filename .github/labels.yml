# Label definitions. Synced by .github/workflows/label-sync.yml via `gh label`.

# --- Theme lifecycle ---
- name: new theme
  color: 0e8a16
  description: Adds a new community theme
- name: modify theme
  color: 1d76db
  description: Updates an existing theme
- name: delete theme
  color: b60205
  description: Removes an existing theme

# --- Triage / lifecycle ---
- name: needs-triage
  color: ededed
  description: Awaiting maintainer review
- name: stale
  color: cccccc
  description: No activity for extended period
- name: duplicate
  color: cfd3d7
  description: Duplicate of another theme
- name: invalid
  color: e4e669
  description: Not valid

# --- Size ---
- name: size/XS
  color: "3cbf00"
  description: "Diff: 0–10 lines"
- name: size/S
  color: "5d9801"
  description: "Diff: 11–50 lines"
- name: size/M
  color: "eebb00"
  description: "Diff: 51–200 lines"
- name: size/L
  color: "ee9900"
  description: "Diff: 201–800 lines"
- name: size/XL
  color: "ee5500"
  description: "Diff: 800+ lines"
